version: "3.9"

services:
  web:
    build: .
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - onboarding-net

networks:
  onboarding-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
